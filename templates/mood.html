<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Mood | Mood System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 35px 28px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,.15);
            animation: fade .6s ease;
        }

        h2 {
            margin: 0 0 6px;
            text-align: center;
            color: #333;
        }

        .subtitle {
            margin: 0 0 25px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 18px;
            font-size: 14px;
            transition: .3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,.2);
        }

        .note {
            font-size: 12px;
            color: #777;
            margin: -8px 0 18px;
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: .3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,.2);
        }

        .message {
            background: #ffe9ec;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }

        @keyframes fade {
            from { opacity: 0; transform: scale(.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>How are you feeling? 😊</h2>
    <p class="subtitle">Choose your mood & preferred movie genre</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="message">
          {% for msg in messages %}
            {{ msg }}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Your Mood</label>
        <select name="mood" required>
            <option value="">-- Choose Mood --</option>
            <option value="happy">😊 Happy</option>
            <option value="sad">😢 Sad</option>
            <option value="relaxed">😌 Relaxed</option>
            <option value="angry">😠 Angry</option>
            <option value="romantic">🥰 Romantic</option>
            <option value="serious">😐 Serious</option>
            <option value="bored">🥱 Bored</option>
            <option value="curious">🤔 Curious</option>
            <option value="disgusted">😖 Disgusted</option>
        </select>

        <label>Movie Genre</label>
        <select name="genre" required>
            <option value="">-- Choose Genre --</option>
            <option value="action">🎬 Action</option>
            <option value="comedy">😂 Comedy</option>
            <option value="romance">❤️ Romance</option>
            <option value="horror">😱 Horror</option>
            <option value="adventure">🧭 Adventure</option>
            <option value="drama">🎭 Drama</option>
            <option value="crime Thriller">🕵️ Crime Thriller</option>
            <option value="fantasy">🐉 Fantasy</option>
            <option value="sci-fi">🚀 Sci-Fi</option>
        </select>

        <div class="note">Genre selection applies only to movies</div>

        <button type="submit">Get Recommendations</button>
    </form>
</div>

</body>
</html>
